<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- SEO -->
    {% seo %}
    
    <!-- Basic styling -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            border-bottom: 1px solid #eee;
            margin-bottom: 40px;
            padding-bottom: 20px;
        }
        
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        
        header p {
            color: #666;
            margin: 10px 0 0 0;
        }
        
        nav {
            margin-top: 20px;
        }
        
        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #007acc;
        }
        
        nav a:hover {
            text-decoration: underline;
        }
        
        article {
            margin-bottom: 40px;
        }
        
        article h2 {
            margin-bottom: 10px;
        }
        
        article h2 a {
            text-decoration: none;
            color: #333;
        }
        
        article h2 a:hover {
            color: #007acc;
        }
        
        .post-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        
        .post-excerpt {
            margin-bottom: 15px;
        }
        
        .read-more {
            color: #007acc;
            text-decoration: none;
            font-weight: bold;
        }
        
        .read-more:hover {
            text-decoration: underline;
        }
        
        footer {
            border-top: 1px solid #eee;
            margin-top: 40px;
            padding-top: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ site.baseurl }}/" style="text-decoration: none; color: inherit;">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
        <nav>
            <a href="{{ site.baseurl }}/">Home</a>
            <a href="{{ site.baseurl }}/about/">About</a>
            <a href="{{ site.baseurl }}/legal/">Legal</a>
        </nav>
    </header>
    
    <main>
        {{ content }}
    </main>
    
    <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
    </footer>
</body>
</html>
